project_name: water-level-classification-template
experiment_name: vistula_linear_minmax
random_seed: 42

paths:
  raw_csv: data/raw/vistula.csv
  dataset_metadata: data/raw/dataset_metadata_vistula.json
  processed_dir: data/processed/vistula_linear_minmax
  preprocessor_artifact: models/vistula_linear_minmax/preprocessor.json
  model_checkpoint: models/vistula_linear_minmax/model.pt
  training_history_csv: reports/vistula_linear_minmax/training_history.csv
  training_summary_json: reports/vistula_linear_minmax/training_summary.json
  evaluation_json: reports/vistula_linear_minmax/evaluation.json
  predictions_csv: reports/vistula_linear_minmax/test_predictions.csv
  confusion_matrix_png: reports/vistula_linear_minmax/confusion_matrix.png
  pairplot_png: reports/global/vistula_pairplot.png
  feature_hist_png: reports/global/vistula_feature_histograms.png
  training_curves_png: reports/vistula_linear_minmax/training_curves.png

data:
  target_column: timestamp
  feature_columns:
    - water_level_m
  test_size: 0.2
  validation_size: 0.2

preprocessing:
  strategy: minmax

model:
  name: linear_classifier

training:
  hidden_dims: []
  learning_rate: 0.05
  epochs: 120
  batch_size: 16
  weight_decay: 0.0001

visualization:
  figure_dpi: 160
