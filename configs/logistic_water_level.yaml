project_name: water-level-classification
experiment_name: logistic_water_level_classification
random_seed: 42

paths:
  raw_csv: data/processed/water_level_training_with_wind.csv
  dataset_metadata: data/processed/water_level_training_with_wind_metadata.json
  processed_dir: data/processed/logistic_model
  preprocessor_artifact: models/logistic_water_level/preprocessor.pkl
  model_checkpoint: models/logistic_water_level/model.pt
  training_history_csv: reports/logistic_water_level/training_history.csv
  training_summary_json: reports/logistic_water_level/training_summary.json
  evaluation_json: reports/logistic_water_level/evaluation.json
  predictions_csv: reports/logistic_water_level/test_predictions.csv
  confusion_matrix_png: reports/logistic_water_level/confusion_matrix.png
  pairplot_png: reports/global/logistic_water_level_pairplot.png
  feature_hist_png: reports/global/logistic_water_level_feature_histograms.png
  feature_importance_png: reports/logistic_water_level/feature_importance.png
  training_curves_png: reports/logistic_water_level/training_curves.png

data:
  target_column: water_level_class
  feature_columns:
    - water_level_m
    - rain_1h_sum
    - rain_3h_sum
    - rain_6h_sum
    - rain_12h_sum
    - rain_24h_sum
    - temp_mean
    - temp_delta_24h
    - thaw_flag
    - soil_saturation_index
    - pressure_hpa
    - humidity_percentage
    - wind_speed
    - wind_direction
    - wind_u
    - wind_v
  class_names:
    - low
    - high
  test_size: 0.2
  validation_size: 0.1
  split_strategy: temporal
  timestamp_column: timestamp
  validation_start: "2023-10-01"
  test_start: "2024-01-01"

preprocessing:
  strategy: minmax

model:
  name: logistic_regression

training:
  hidden_dims: []
  learning_rate: 0.005
  epochs: 80
  batch_size: 32
  weight_decay: 0.00001

visualization:
  figure_dpi: 150
