  timestamp_column: timestamp
  validation_start: "2023-10-01"
  test_start: "2024-01-01"

preprocessing:
  strategy: minmax

feature_engineering:
  generate_lag_features: true
  lag_hours: 72
  generate_rolling_features: true
  rolling_windows: [3, 6, 12, 24]
  generate_seasonal_features: true

model:
  name: logistic_regression

training:
  hidden_dims: []
  learning_rate: 0.005
  epochs: 80
  batch_size: 4096
  weight_decay: 0.00001

visualization:
  figure_dpi: 150
