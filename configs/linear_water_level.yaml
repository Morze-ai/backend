project_name: water-level-classification
experiment_name: linear_water_level_classification
random_seed: 42

paths:
  raw_csv: data/processed/water_level_synchronized_hourly.csv
  processed_dir: data/processed/linear_model
  preprocessor_artifact: models/linear_water_level/preprocessor.pkl
  model_checkpoint: models/linear_water_level/model.pt
  training_history_csv: reports/linear_water_level/training_history.csv
  training_summary_json: reports/linear_water_level/training_summary.json
  evaluation_json: reports/linear_water_level/evaluation.json
  predictions_csv: reports/linear_water_level/test_predictions.csv
  confusion_matrix_png: reports/linear_water_level/confusion_matrix.png
  feature_importance_png: reports/linear_water_level/feature_importance.png
  training_curves_png: reports/linear_water_level/training_curves.png

data:
  target_column: water_level_m
  feature_columns:
    - water_level_m
    - rain_1h_sum
    - rain_3h_sum
    - rain_6h_sum
    - rain_12h_sum
    - rain_24h_sum
    - temp_delta_24h
    - temp_mean
    - thaw_flag
    - soil_saturation_index
    - wind_speed
    - wind_direction
    - wind_u
    - wind_v
  test_size: 0.2
  validation_size: 0.1

preprocessing:
  strategy: minmax

model:
  name: linear_classifier

training:
  hidden_dims: []
  learning_rate: 0.01
  epochs: 100
  batch_size: 32
  weight_decay: 0.0001

visualization:
  figure_dpi: 150
